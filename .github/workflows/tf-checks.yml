name: tf-checks
on:
  push:
    branches: [ master ]
  pull_request:
  workflow_dispatch:
jobs:
  complete-example:
    uses: clouddrove/github-shared-workflows/.github/workflows/stf-checks.yml@d27d2d3b49bcf14db85bdfb0f57956abf18bb091 # pinned to latest
    with:
      provider: digitalocean
      working_directory: './_examples/complete/'

# Separate job for TFlint workflow call
  tf-lint:
    uses: clouddrove/github-shared-workflows/.github/workflows/tf-lint.yml@d27d2d3b49bcf14db85bdfb0f57956abf18bb091 # pinned to latest
    secrets:
      GITHUB: ${{ secrets.GITHUB }}
